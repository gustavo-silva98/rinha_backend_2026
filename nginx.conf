worker_processes 1;

events {
    multi_accept on;
    worker_connections 4096;
    use epoll;
}


http{
    access_log off;
    error_log /dev/null;   

    upstream api {
        server api1:8001;
        server api2:8002;
        keepalive 256;
    }

    server {
        listen 9999;
        keepalive_timeout 75s;
        keepalive_requests 100000;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}